# Nginx reverse proxy config for rpc-stats API
# Place at: /etc/nginx/sites-available/rpc-stats
# Enable:   sudo ln -s /etc/nginx/sites-available/rpc-stats /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx

server {
    listen 80;
    server_name _;          # Replace with your EC2 domain or IP if you add SSL

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Forward real client IP
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade support (for /api/v1/ws)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout  90;
        proxy_send_timeout  90;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
    }

    # ── Block all other traffic ───────────────────────────────────────────────
    location / {
        return 404;
    }
}
