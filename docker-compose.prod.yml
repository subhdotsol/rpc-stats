# Production override — used by GitHub Actions deploy
# - Swaps build: . for pre-built DockerHub image
# - Removes postgres/redis/kafka host port bindings (conflicts with m8m-postgres on 5432)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

x-prod-image: &prod-image
  image: ${DOCKERHUB_USERNAME}/rpc-stats:latest

services:
  # ── Remove conflicting host ports ──────────────────────────────────────────
  # m8m-postgres already owns host:5432. Internal Docker networking still works.
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  db-migrator:
    <<: *prod-image

  api:
    <<: *prod-image

  alert-service:
    <<: *prod-image

  geyser-consumer:
    <<: *prod-image

  ingestion-service:
    <<: *prod-image

  scheduler-service:
    <<: *prod-image

  stat-engine:
    <<: *prod-image
