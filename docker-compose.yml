x-rust-service: &rust-service
  build: .
  restart: unless-stopped
  env_file:
    - .env
  environment:
    - DATABASE_URL=postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-rpc}
    - REDIS_URL=redis://redis:6379
    - KAFKA_BROKERS=kafka:9092
    - API_HOST=0.0.0.0
  depends_on:
    db-migrator:
      condition: service_completed_successfully
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: rpc_stats_postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-rpc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-rpc}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rpc_redis
    restart: unless-stopped
    command: >
      redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb
      --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: rpc_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/apache/kafka
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list" ]
      interval: 10s
      timeout: 10s
      retries: 5

  redis_insight:
    image: redislabs/redisinsight:latest
    container_name: rpc_redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - debug

  db-migrator:
    build: .
    container_name: rpc_db_migrator
    command: ["sqlx", "migrate", "run", "--source", "./migrations"]
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-rpc}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *rust-service
    container_name: rpc_api
    command: ["api"]
    ports:
      - "8080:8080"

  alert-service:
    <<: *rust-service
    container_name: rpc_alert_service
    command: ["alert-service"]
    ports:
      - "7005:7005"

  geyser-consumer:
    <<: *rust-service
    container_name: rpc_geyser_consumer
    command: ["geyser-consumer"]

  ingestion-service:
    <<: *rust-service
    container_name: rpc_ingestion_service
    command: ["ingestion-service"]

  scheduler-service:
    <<: *rust-service
    container_name: rpc_scheduler_service
    command: ["scheduler-service"]

  worker-service:
    <<: *rust-service
    container_name: rpc_worker_service
    command: ["worker-service"]

  stat-engine:
    <<: *rust-service
    container_name: rpc_stat_engine
    command: ["stat-engine"]

  incident-service:
    <<: *rust-service
    container_name: rpc_incident_service
    command: ["incident-service"]

volumes:
  postgres_data:
  redis_data:
  kafka_data:
